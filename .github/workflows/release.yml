name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            desktop-file-utils \
            libadwaita-1-dev \
            libgtk-4-dev \
            libwayland-dev \
            meson \
            ninja-build \
            pkg-config \
            wayland-protocols \
            wl-clipboard

      - name: Install GTK4 layer-shell
        run: |
          if apt-cache show libgtk4-layer-shell-dev >/dev/null 2>&1; then
            sudo apt-get install -y libgtk4-layer-shell-dev
            exit 0
          fi

          GTK4_LAYER_SHELL_VERSION=1.0.4
          git clone --depth=1 --branch "v${GTK4_LAYER_SHELL_VERSION}" \
            https://github.com/wmww/gtk4-layer-shell.git \
            "$RUNNER_TEMP/gtk4-layer-shell"

          meson setup "$RUNNER_TEMP/gtk4-layer-shell-build" "$RUNNER_TEMP/gtk4-layer-shell" \
            --prefix=/usr \
            -Dexamples=false \
            -Ddocs=false \
            -Dtests=false \
            -Dintrospection=false \
            -Dvapi=false

          meson compile -C "$RUNNER_TEMP/gtk4-layer-shell-build"
          sudo meson install -C "$RUNNER_TEMP/gtk4-layer-shell-build"
          sudo ldconfig

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check tag matches Cargo version
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          test "v$VERSION" = "$GITHUB_REF_NAME"

      - name: Package release archive
        run: ./packaging/linux/package-release.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.sha256 \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
