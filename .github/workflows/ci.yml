name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            desktop-file-utils \
            libadwaita-1-dev \
            libgtk-4-dev \
            libwayland-dev \
            meson \
            ninja-build \
            pkg-config \
            wayland-protocols \
            wl-clipboard

      - name: Install GTK4 layer-shell
        run: |
          if apt-cache show libgtk4-layer-shell-dev >/dev/null 2>&1; then
            sudo apt-get install -y libgtk4-layer-shell-dev
            exit 0
          fi

          GTK4_LAYER_SHELL_VERSION=1.0.4
          git clone --depth=1 --branch "v${GTK4_LAYER_SHELL_VERSION}" \
            https://github.com/wmww/gtk4-layer-shell.git \
            "$RUNNER_TEMP/gtk4-layer-shell"

          meson setup "$RUNNER_TEMP/gtk4-layer-shell-build" "$RUNNER_TEMP/gtk4-layer-shell" \
            --prefix=/usr \
            -Dexamples=false \
            -Ddocs=false \
            -Dtests=false \
            -Dintrospection=false \
            -Dvapi=false

          meson compile -C "$RUNNER_TEMP/gtk4-layer-shell-build"
          sudo meson install -C "$RUNNER_TEMP/gtk4-layer-shell-build"
          sudo ldconfig

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check desktop files
        run: desktop-file-validate packaging/linux/*.desktop

      - name: Check shell scripts
        run: sh -n packaging/linux/install-local.sh packaging/linux/install-system.sh packaging/linux/package-release.sh packaging/linux/self-check.sh

      - name: Build debug
        run: cargo check --locked

      - name: Build release
        run: cargo build --locked --release

      - name: Package release archive
        run: ./packaging/linux/package-release.sh

      - name: Compile tests
        run: cargo test --locked --no-run

      - name: Smoke test local install
        run: |
          PREFIX_DIR="$RUNNER_TEMP/clipway-root"
          ./packaging/linux/install-local.sh --prefix="$PREFIX_DIR"
          test -x "$PREFIX_DIR/bin/clipway"
          test -x "$PREFIX_DIR/bin/clipway-self-check"
          "$PREFIX_DIR/bin/clipway" help >/dev/null
          CLIPWAY_BIN="$PREFIX_DIR/bin/clipway" "$PREFIX_DIR/bin/clipway-self-check"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipway-linux-package
          path: |
            dist/*.tar.gz
            dist/*.sha256
